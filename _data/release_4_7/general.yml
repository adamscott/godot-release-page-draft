introduction:
  text: |
    Like a fine wine: Godot 4 has only gotten better with age. The first few releases had a focus of stability, granting the engine a rock-solid foundation that could be safely and easily iterated upon. Gradually, this has shifted more towards polish and quality-of-life, peaking in [Godot 4.6](https://godotengine.org/releases/4.6/) giving developers the tools to put you and your workflow first.

    This brings us to Godot 4.7: With 3 years under its sleeve, the 4.7 vintage offers colors of never reached intensity. HDR Output radiates bold and brilliant new hues, allowing your projects to shine like never before. Elevate your work even further with the new Asset Store, bask in the ease of creation with standalone Android exporting and publishing, and helm a bevy of new features to eliminate any remaining friction between you and your vision.

conclusion:
  title: Team work makes the dream work
  text: |
    Thanks to all the contributors who had PRs merged into this release.
    Special thanks goes out to all the engine teams that collaborated on this release, especially since commits to other related repositories do not show up in this graphic.

